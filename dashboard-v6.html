<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trader Dashboard v6</title><style>:root{--bg:#07111f;--p:rgba(14,26,48,.92);--t:#e8f6ff;--m:#94a3b8;--c:#67e8f9;--g:#86efac;--r:#f87171;--l:rgba(103,232,249,.24)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Arial}.app{padding:6px;max-width:1540px;margin:auto}.bar{display:grid;grid-template-columns:170px repeat(6,1fr) 90px;gap:5px;align-items:center;background:var(--p);border:1px solid var(--l);border-radius:10px;padding:5px;margin-bottom:6px}.brand{font-weight:900;font-size:.86rem}.sub{display:block;color:var(--m);font-size:.55rem;font-weight:400;margin-top:1px}.pill{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.15);border-radius:8px;padding:4px 6px;min-height:38px}.city{font-size:.68rem;font-weight:900;line-height:1}.ex{font-size:.55rem;color:var(--m);line-height:1;margin-top:1px}.tm{font-size:.68rem;font-weight:900;line-height:1;margin-top:3px}.stat{font-size:.55rem;font-weight:900}.open{color:var(--g)}.closed{color:var(--r)}button{background:#10223d;color:var(--t);border:1px solid var(--l);border-radius:8px;padding:5px 7px;font-weight:800;font-size:.66rem}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:7px;grid-auto-flow:dense}.panel{position:relative;grid-column:span var(--w,6);background:var(--p);border:1px solid var(--l);border-radius:10px;padding:7px;min-height:0}.head{padding-right:145px;margin-bottom:4px}.head h2{font-size:.78rem;margin:0;line-height:1}.head p{font-size:.58rem;color:var(--m);margin:2px 0 0}.ctl{position:absolute;top:5px;right:5px;background:rgba(8,18,35,.88);border-radius:999px;padding:2px;display:flex;gap:2px}.ctl button{font-size:.55rem;padding:3px 5px;border-radius:999px}.arrows{display:none}.panel.on{outline:1px dashed var(--c);outline-offset:2px}.panel.on .arrows{display:inline-flex}.body{height:var(--h,auto);overflow:auto}.chartBox{height:calc(var(--h,430px) - 62px);min-height:170px;border-radius:8px;overflow:hidden;background:#050d19;border:1px solid rgba(148,163,184,.16)}iframe{width:100%;height:100%;border:0}.symbols{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:5px}.sym{padding:4px;border-radius:7px;background:rgba(255,255,255,.045);border:1px solid rgba(103,232,249,.22);font-size:.66rem}.sym.active{background:rgba(103,232,249,.18)}.storyList{height:var(--h,430px);overflow:auto}.story{padding:5px 7px;border-left:2px solid var(--c);background:rgba(255,255,255,.045);border-radius:8px;margin-bottom:4px}.story a{color:var(--t);font-weight:900;text-decoration:none;font-size:.76rem}.muted{color:var(--m);font-size:.62rem}.score{color:var(--g);font-size:.6rem;font-weight:900;margin-top:3px}.cards{display:grid;grid-template-columns:1fr;gap:4px;height:var(--h,210px);overflow:auto}.card{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.14);border-radius:8px;padding:5px 7px}.card b{font-size:.72rem}table{width:100%;border-collapse:collapse;font-size:.66rem}td{padding:3px 4px;border-bottom:1px solid rgba(148,163,184,.15)}.scroll{height:var(--h,130px);overflow:auto}.notes{height:var(--h,95px);width:100%;background:#06101f;border:1px solid var(--l);border-radius:8px;color:var(--t);padding:6px;resize:none}@media(max-width:950px){.bar{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.panel{grid-column:span 1!important}.body,.storyList,.scroll,.cards,.notes{height:auto!important}.head{padding-right:135px}.symbols{grid-template-columns:repeat(3,1fr)}}@media(max-width:650px){.bar{grid-template-columns:1fr}.symbols{grid-template-columns:1fr}.head{padding-right:0;padding-top:23px}.ctl{left:5px;right:auto}}</style></head><body><div class="app"><div id="bar" class="bar"><div class="brand">Trader Dashboard v6<span class="sub">session • clocks • refresh</span></div></div><main id="grid" class="grid"><section class="panel" data-id="chart" style="--w:7;--h:500px"><div class="head"><h2>Chart / Watchlist</h2><p>Click a symbol to load it.</p></div><div class="ctl"></div><div class="body"><div class="chartBox"><iframe id="tv"></iframe></div><div><span id="chartLabel" class="muted"></span> <a id="tvOpen" class="muted" target="_blank">Open</a></div><div id="symbols" class="symbols"></div></div></section><section class="panel" data-id="news" style="--w:5;--h:500px"><div class="head"><h2>Top Stories</h2><p>Scrollable news list.</p></div><div class="ctl"></div><div id="newsRoot" class="storyList"></div></section><section class="panel" data-id="sources" style="--w:3;--h:130px"><div class="head"><h2>Sources</h2><p>Compact ratings.</p></div><div class="ctl"></div><div id="sourcesRoot" class="scroll"></div></section><section class="panel" data-id="assets" style="--w:3;--h:210px"><div class="head"><h2>Tracked</h2><p>Compact reference.</p></div><div class="ctl"></div><div id="assetRoot" class="cards"></div></section><section class="panel" data-id="notes" style="--w:3;--h:95px"><div class="head"><h2>Notes</h2><p>Saved locally.</p></div><div class="ctl"></div><textarea id="notes" class="notes"></textarea></section><section class="panel" data-id="rules" style="--w:3;--h:70px"><div class="head"><h2>Rules</h2><p>Layout controls.</p></div><div class="ctl"></div><div class="body"><p class="muted">Move → ↑ ↓ − + H− H+</p></div></section></main></div><script>const LKEY='td_v6_layout_1';const assets=[['NQ','CAPITALCOM:US100','US100'],['ES','CAPITALCOM:US500','US500'],['YM','CAPITALCOM:US30','US30'],['Gold','OANDA:XAUUSD','XAUUSD'],['Oil','TVC:USOIL','USOIL'],['BTC','BINANCE:BTCUSDT','BTC'],['ETH','BINANCE:ETHUSDT','ETH'],['EURUSD','FX:EURUSD','EURUSD'],['USDJPY','FX:USDJPY','USDJPY'],['SPY','AMEX:SPY','SPY'],['QQQ','NASDAQ:QQQ','QQQ'],['DXY','TVC:DXY','DXY']];const feeds=[['Kobeissi Letter',82],['Mises Institute',80],['Real Vision',78],['Coin Bureau',74],['FXStreet',70],['Cointelegraph',66],['Investing.com',65],['ZeroHedge',60]];const stories=['Rate expectations remain a key market driver','Treasury yields and dollar strength can pressure equities','Crypto liquidity can show speculative appetite','USD reaction watch around major data','Economic calendar releases can dominate the session','Oil headlines can shift inflation expectations quickly','Equity breadth should confirm any NQ breakout','Liquidity expansion favors risk assets','Inflation persistence keeps real yields in focus','Dollar and yen reaction helps confirm tone','Credit headlines can alter risk appetite','Nasdaq momentum needs ES and YM confirmation','Gold reacts to real yields and dollar pressure','Bitcoin gives risk appetite clues','Market breadth should confirm breakout attempts'];const markets=[['NY','NYSE / Nasdaq','America/New_York',9.5,16],['CHI','CME','America/Chicago',8.5,15.25],['LON','LSE','Europe/London',8,16.5],['FRA','Xetra','Europe/Berlin',9,17.5],['TOK','TSE','Asia/Tokyo',9,15],['HK','HKEX','Asia/Hong_Kong',9.5,16]];function parts(tz){let p=new Intl.DateTimeFormat('en-US',{timeZone:tz,weekday:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date()),o={};p.forEach(x=>{if(x.type!=='literal')o[x.type]=x.value});return o}function dec(p){return +p.hour+(+p.minute/60)+(+p.second/3600)}function status(p,o,c){if(p.weekday==='Sat'||p.weekday==='Sun')return['CLOSED','closed'];let t=dec(p);return t>=o&&t<c?['OPEN','open']:['CLOSED','closed']}function renderBar(){let any=false;bar.innerHTML='<div class="brand">Trader Dashboard v6<span class="sub">session • clocks • refresh</span></div>'+markets.map(m=>{let p=parts(m[2]),s=status(p,m[3],m[4]);if(s[0]==='OPEN')any=true;return '<div class="pill"><div class="city">'+m[0]+'</div><div class="ex">'+m[1]+'</div><div class="tm">'+p.hour+':'+p.minute+':'+p.second+' <span class="stat '+s[1]+'">'+s[0]+'</span></div></div>'}).join('')+'<button id="refreshBtn">Refresh</button>';sessionText=any?'Active Session':'Closed'}function renderNews(){newsRoot.innerHTML='<div class="muted" style="margin-bottom:4px">Mode: compact • 15 stories</div>'+stories.map((s,i)=>'<div class="story"><div class="muted">#'+(i+1)+' • '+feeds[i%feeds.length][0]+'</div><a href="#">'+s+'</a><div class="muted">Trading scanner note.</div><div class="score">Score: '+(75-i%9)+' | Source: '+feeds[i%feeds.length][1]+'</div></div>').join('')}function renderSources(){sourcesRoot.innerHTML='<table>'+feeds.map(f=>'<tr><td>'+f[0]+'</td><td>'+f[1]+'</td></tr>').join('')+'</table>'}function chart(sym,label){chartLabel.textContent=label+' • '+sym;tvOpen.href='https://www.tradingview.com/chart/?symbol='+encodeURIComponent(sym);tv.src='https://s.tradingview.com/widgetembed/?symbol='+encodeURIComponent(sym)+'&interval=5&theme=dark&style=1&timezone=Etc%2FUTC'}function renderSymbols(){symbols.innerHTML=assets.map((a,i)=>'<button class="sym '+(i===0?'active':'')+'" data-s="'+a[1]+'" data-label="'+a[0]+'">'+a[0]+'</button>').join('');assetRoot.innerHTML=assets.map(a=>'<div class="card"><b>'+a[0]+'</b><div class="muted">'+a[2]+'</div></div>').join('');document.querySelectorAll('.sym').forEach(b=>b.onclick=()=>{document.querySelectorAll('.sym').forEach(x=>x.classList.remove('active'));b.classList.add('active');chart(b.dataset.s,b.dataset.label)});chart(assets[0][1],assets[0][0])}function controls(){document.querySelectorAll('.panel').forEach(p=>{p.querySelector('.ctl').innerHTML='<button class="move">Move</button><span class="arrows"><button data-act="up">↑</button><button data-act="down">↓</button><button data-act="narrow">−</button><button data-act="wide">+</button><button data-act="short">H−</button><button data-act="tall">H+</button></span>';p.querySelector('.move').onclick=()=>p.classList.toggle('on');p.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>act(p,b.dataset.act))})}function currentH(p){return +(p.style.getPropertyValue('--h')||'220px').replace('px','')||220}function act(p,a){if(a==='up'&&p.previousElementSibling)grid.insertBefore(p,p.previousElementSibling);if(a==='down'&&p.nextElementSibling)grid.insertBefore(p.nextElementSibling,p);let w=+(p.style.getPropertyValue('--w')||6),h=currentH(p);if(a==='narrow')w=Math.max(3,w-1);if(a==='wide')w=Math.min(12,w+1);if(a==='short')h=Math.max(50,h-40);if(a==='tall')h=Math.min(900,h+40);p.style.setProperty('--w',w);p.style.setProperty('--h',h+'px');save()}function save(){localStorage.setItem(LKEY,JSON.stringify([...document.querySelectorAll('.panel')].map(p=>({id:p.dataset.id,w:+(p.style.getPropertyValue('--w')||6),h:p.style.getPropertyValue('--h')||'auto'}))))}function load(){try{JSON.parse(localStorage.getItem(LKEY)||'[]').forEach(x=>{let p=document.querySelector('[data-id="'+x.id+'"]');if(p){p.style.setProperty('--w',x.w);if(x.h)p.style.setProperty('--h',x.h);grid.appendChild(p)}})}catch{}}function boot(){load();controls();renderBar();renderSymbols();renderSources();renderNews();notes.value=localStorage.getItem('td_notes')||'';notes.oninput=()=>localStorage.setItem('td_notes',notes.value);setInterval(renderBar,1000)}boot();</script></body></html>
