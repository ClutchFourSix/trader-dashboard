<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trader Dashboard v7</title><style>:root{--bg:#07111f;--p:rgba(14,26,48,.92);--t:#e8f6ff;--m:#94a3b8;--c:#67e8f9;--g:#86efac;--r:#f87171;--l:rgba(103,232,249,.24)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Arial;font-size:14px}.app{padding:6px;max-width:1540px;margin:auto}.bar{display:grid;grid-template-columns:175px repeat(6,1fr);gap:5px;align-items:center;background:var(--p);border:1px solid var(--l);border-radius:10px;padding:5px;margin-bottom:6px}.pill{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.15);border-radius:8px;padding:5px}.city{font-weight:900}.tm{font-weight:900}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:7px}.panel{grid-column:span var(--w,4);background:var(--p);border:1px solid var(--l);border-radius:10px;padding:7px}.big{font-size:.9rem;font-weight:900}.story{padding:6px;background:rgba(255,255,255,.05);margin-bottom:5px;border-left:2px solid var(--c)}.blurb{font-size:.75rem;color:#b6c5d8}.good{color:var(--g)}.risk{color:var(--r)}</style></head><body><div class="app"><div id="bar" class="bar"></div><main class="grid"><div class="panel" style="--w:4"><div class="big">RISK: OFF</div>NQ: Sell rallies<br>Gold: Bid</div><div class="panel" style="--w:4">Session: NY<br>Expect sweep</div><div class="panel" style="--w:4"><div class="risk">CPI Soon</div>Avoid trades</div><div class="panel" style="--w:7"><iframe src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:QQQ" style="width:100%;height:400px"></iframe></div><div class="panel" style="--w:5" id="news"></div><div class="panel" style="--w:3">Liquidity: Range</div><div class="panel" style="--w:3">YM Divergence: Yes</div><div class="panel" style="--w:3">Trade: Short</div></main></div><script>function render(){bar.innerHTML='<div class="pill">NY 12:00</div><div class="pill">TOK 01:00</div>';news.innerHTML=['Rates moving','USD strong'].map(s=>'<div class="story">'+s+'<div class="blurb">Context</div></div>').join('')}render();</script></body></html>
