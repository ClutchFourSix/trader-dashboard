<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Layout v3</title><style>body{margin:0;background:#07111f;color:white;font-family:Arial;padding:14px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.box{background:#101d33;border:1px solid #326f83;border-radius:16px;padding:14px}.span-4{grid-column:span 4}.span-6{grid-column:span 6}.span-8{grid-column:span 8}.span-12{grid-column:span 12}button{background:#182d4c;color:white;border:1px solid #326f83;border-radius:10px;padding:8px 10px;margin:3px}.arrows{display:none}.arrows.show{display:inline-block}.selected{outline:2px dashed #67e8f9;outline-offset:4px}@media(max-width:800px){.grid{grid-template-columns:1fr}.box{grid-column:span 1!important}}</style></head><body><h1>Layout v3</h1><p>Tap Move. Arrows appear. Up and down reorder. Left shrinks. Right widens.</p><div id="grid" class="grid"><section class="box span-8" data-id="a" data-span="8"><h2>News</h2><button class="move">Move</button><span class="arrows"><button data-dir="up">Up</button><button data-dir="down">Down</button><button data-dir="left">Left</button><button data-dir="right">Right</button></span><p>Box A</p></section><section class="box span-4" data-id="b" data-span="4"><h2>Sources</h2><button class="move">Move</button><span class="arrows"><button data-dir="up">Up</button><button data-dir="down">Down</button><button data-dir="left">Left</button><button data-dir="right">Right</button></span><p>Box B</p></section><section class="box span-6" data-id="c" data-span="6"><h2>Notes</h2><button class="move">Move</button><span class="arrows"><button data-dir="up">Up</button><button data-dir="down">Down</button><button data-dir="left">Left</button><button data-dir="right">Right</button></span><p>Box C</p></section></div><script>function setSpan(el,span){span=Math.max(4,Math.min(12,span));el.dataset.span=span;el.classList.remove('span-4','span-6','span-8','span-12');el.classList.add('span-'+span)}function save(){localStorage.setItem('layout_v3',JSON.stringify([...document.querySelectorAll('.box')].map(el=>({id:el.dataset.id,span:+el.dataset.span}))))}function load(){try{const s=JSON.parse(localStorage.getItem('layout_v3')||'[]');const g=document.getElementById('grid');s.forEach(x=>{const el=document.querySelector('[data-id="'+x.id+'"]');if(el){setSpan(el,x.span);g.appendChild(el)}})}catch(e){}}function move(el,dir){if(dir==='up'&&el.previousElementSibling)el.parentElement.insertBefore(el,el.previousElementSibling);if(dir==='down'&&el.nextElementSibling)el.parentElement.insertBefore(el.nextElementSibling,el);if(dir==='left')setSpan(el,(+el.dataset.span||6)-2);if(dir==='right')setSpan(el,(+el.dataset.span||6)+2);save()}load();document.querySelectorAll('.move').forEach(btn=>btn.onclick=()=>{const b=btn.closest('.box');b.classList.toggle('selected');b.querySelector('.arrows').classList.toggle('show')});document.querySelectorAll('[data-dir]').forEach(btn=>btn.onclick=()=>move(btn.closest('.box'),btn.dataset.dir));</script></body></html>
