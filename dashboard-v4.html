<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trader Dashboard v4</title><style>:root{--bg:#07111f;--p:rgba(14,26,48,.9);--t:#e8f6ff;--m:#94a3b8;--c:#67e8f9;--g:#86efac;--a:#fbbf24;--r:#f87171;--l:rgba(103,232,249,.24)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 10%,rgba(103,232,249,.1),transparent 30%),var(--bg);color:var(--t);font-family:Arial,Helvetica,sans-serif}.app{max-width:1540px;margin:auto;padding:14px}.glass{background:var(--p);border:1px solid var(--l);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.28)}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px;margin-bottom:12px}.top h1{margin:0;font-size:1.35rem}.top p,.muted{color:var(--m);font-size:.86rem}.btn,button{background:#10223d;color:var(--t);border:1px solid var(--l);border-radius:10px;padding:7px 10px;font-weight:800;cursor:pointer}.primary{background:rgba(6,182,212,.25)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.panel{padding:14px;min-height:120px}.s12{grid-column:span 12}.s9{grid-column:span 9}.s8{grid-column:span 8}.s6{grid-column:span 6}.s4{grid-column:span 4}.s3{grid-column:span 3}.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.head h2{margin:0;font-size:1.05rem}.head p{margin:4px 0 0;color:var(--m);font-size:.83rem}.moveWrap{display:flex;gap:5px;align-items:center;flex-wrap:wrap}.moveBtn,.arrowBtn{font-size:.72rem;color:var(--c);border-radius:999px;background:#10223d}.moveBtn.on{background:rgba(103,232,249,.22);color:#fff}.arrows{display:none;gap:4px}.arrows.on{display:inline-flex}.arrowBtn{font-size:.9rem;line-height:1;padding:6px 8px;color:#fff}.selected{outline:1px dashed rgba(103,232,249,.65);outline-offset:4px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.15);border-radius:14px;padding:12px}.big{font-weight:900;font-size:1.1rem;margin-top:6px}.clocks{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.status{font-size:.72rem;border-radius:999px;padding:4px 7px;border:1px solid var(--l);font-weight:900}.open{color:var(--g)}.pre{color:var(--a)}.closed{color:var(--r)}.chartBox{height:430px;border-radius:14px;overflow:hidden;border:1px solid rgba(148,163,184,.18);background:#050d19}.chartBox iframe{width:100%;height:100%;border:0}.symbols{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:10px}.sym{padding:8px;border-radius:10px;background:rgba(255,255,255,.045);border:1px solid rgba(103,232,249,.22);text-align:center}.sym.active{background:rgba(103,232,249,.18);border-color:rgba(103,232,249,.65)}.chartNote{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:8px}.story{padding:12px;border-left:3px solid var(--c);background:rgba(255,255,255,.045);border-radius:12px;margin-bottom:10px}.story a{color:var(--t);text-decoration:none;font-weight:900}.score{font-size:.78rem;font-weight:900;margin-top:8px;color:var(--g)}table{width:100%;border-collapse:collapse;font-size:.82rem}td,th{padding:7px;border-bottom:1px solid rgba(148,163,184,.15);text-align:left}.compact{max-height:220px;overflow:auto}.assetGrid{display:grid;grid-template-columns:1fr;gap:7px}.assetGrid .card{padding:8px 10px}.assetGrid b{font-size:.92rem}.notes{width:100%;min-height:150px;border-radius:14px;border:1px solid var(--l);background:#06101f;color:var(--t);padding:10px;resize:vertical}@media(max-width:1000px){.s9,.s8,.s6,.s4,.s3{grid-column:span 12}.cards{grid-template-columns:repeat(2,1fr)}.clocks{grid-template-columns:repeat(3,1fr)}.symbols{grid-template-columns:repeat(3,1fr)}.assetGrid{grid-template-columns:repeat(4,1fr)}}@media(max-width:650px){.grid,.cards,.clocks,.symbols,.assetGrid{grid-template-columns:1fr}.s12,.s9,.s8,.s6,.s4,.s3{grid-column:span 1!important}.top{flex-direction:column;align-items:flex-start}.chartBox{height:330px}}</style></head><body><div class="app"><header class="top glass"><div><h1>Trader Dashboard</h1><p>Compact macro/news dashboard with market clocks, source scoring, chart, and movable panels.</p></div><button id="refreshBtn" class="primary">Refresh News</button></header><main id="grid" class="grid"></main></div><script>const $=id=>document.getElementById(id);const assetList=[['NQ','CAPITALCOM:US100','US100 proxy for NQ'],['ES','CAPITALCOM:US500','US500 proxy for ES'],['YM','CAPITALCOM:US30','US30 proxy for YM'],['Gold','OANDA:XAUUSD','Spot gold'],['Oil','TVC:USOIL','US oil'],['BTC','BINANCE:BTCUSDT','Bitcoin'],['ETH','BINANCE:ETHUSDT','Ethereum'],['EURUSD','FX:EURUSD','Euro dollar'],['USDJPY','FX:USDJPY','Dollar yen'],['SPY','AMEX:SPY','SPY ETF'],['QQQ','NASDAQ:QQQ','QQQ ETF'],['DXY','TVC:DXY','Dollar index']];const feeds=[{name:'Kobeissi Letter',score:82,rss:'https://thekobeissiletter.com/feed/'},{name:'ZeroHedge',score:60,rss:'https://feeds.feedburner.com/zerohedge/feed'},{name:'FXStreet',score:70,rss:'https://www.fxstreet.com/rss/news'},{name:'Investing.com',score:65,rss:'https://www.investing.com/rss/news.rss'},{name:'Coin Bureau',score:74,rss:'https://www.coinbureau.com/feed/'},{name:'Real Vision',score:78,rss:'https://www.realvision.com/blog/rss.xml'},{name:'Mises Institute',score:80,rss:'https://mises.org/rss.xml'},{name:'Cointelegraph',score:66,rss:'https://cointelegraph.com/rss'}];const terms=['cpi','inflation','fed','fomc','rates','yield','jobs','nfp','pce','ppi','bitcoin','crypto','gold','oil','treasury','recession','stocks','dollar','yen','nasdaq','sp500','earnings','liquidity','bank','debt','default','volatility','collapse','crisis'];const fallback=['Fed policy, inflation, and liquidity remain key market drivers','Treasury yields and dollar strength can pressure equities','Debt, deficits, and monetary policy remain structural macro risks','Crypto liquidity and Bitcoin risk appetite remain key cross-market signals','Cross-asset watch: dollar, yields, gold, oil, and equities need alignment','USD reaction watch: CPI, jobs, and Fed expectations drive forex volatility','Red-folder economic releases can dominate the session','Oil headlines can shift inflation expectations quickly','Equity breadth and volatility should confirm any NQ breakout','Liquidity expansion favors risk; tightening favors defense','Inflation persistence keeps real yields in focus','Dollar and yen reaction remains useful for confirming risk tone'].map((t,i)=>({sourceName:['Kobeissi Letter','ZeroHedge','Mises Institute','Coin Bureau','Real Vision','FXStreet'][i%6],sourceScore:70+i%12,title:t,link:'#',summary:'Fallback scanner note for trading relevance.',time:Date.now()-i*900000,relevance:8+(i%5),red:/CPI|Fed|inflation|jobs/i.test(t)}));function panel(id,span,title,desc,inner){return `<section class="panel glass s${span} movable" data-id="${id}" data-span="${span}"><div class="head"><div><h2>${title}</h2><p>${desc}</p></div><div class="moveWrap"><button class="moveBtn">Move</button><span class="arrows"><button class="arrowBtn" data-move="up">⬆</button><button class="arrowBtn" data-move="down">⬇</button><button class="arrowBtn" data-move="left">⬅</button><button class="arrowBtn" data-move="right">➡</button></span></div></div>${inner}</section>`}function build(){grid.innerHTML=panel('status',12,'Status Strip','Session, news health, risk tone, and refresh status.','<div class="cards"><div class="card"><div class="muted">Session</div><div id="session" class="big">-</div></div><div class="card"><div class="muted">News Health</div><div id="health" class="big">Loading</div></div><div class="card"><div class="muted">Risk Tone</div><div id="tone" class="big">-</div></div><div class="card"><div class="muted">Last Refresh</div><div id="last" class="big">-</div></div></div>')+panel('clocksPanel',12,'Market Hometown Clocks','All markets show CLOSED on weekends.','<div id="clockGrid" class="clocks"></div>')+panel('chartPanel',9,'Chart / Watchlist','Uses TradingView-friendly proxy symbols so the chart actually loads.','<div class="chartBox"><iframe id="tv" allowtransparency="true" scrolling="no"></iframe></div><div class="chartNote"><span id="chartLabel" class="muted">Loading chart...</span><a id="tvOpen" class="muted" target="_blank">Open on TradingView</a></div><div id="symbols" class="symbols"></div>')+panel('trackedPanel',3,'Tracked Symbols','Compact reference.','<div id="assetRoot" class="assetGrid"></div>')+panel('newsPanel',8,'Top Ranked Stories','Ranked by source quality, recency, macro relevance, urgency, and watchlist relevance.','<div id="news">Loading...</div>')+panel('sourcesPanel',4,'Source Ratings','Compact so other boxes fit beneath it.','<div id="sources" class="compact"></div>')+panel('notesPanel',6,'Levels & Bias Notes','Saved locally.','<textarea id="notes" class="notes"></textarea>')+panel('rulesPanel',6,'Dashboard Rules','Space-economized layout.','<p class="muted">Click Move to reveal arrows. Up/down moves the panel. Left/right shrinks or widens it. Layout saves locally.</p>')}function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function proxy(u){return['https://api.allorigins.win/raw?url='+encodeURIComponent(u),'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(u)]}async function ft(u){for(const p of proxy(u)){try{const c=new AbortController();setTimeout(()=>c.abort(),6000);const r=await fetch(p,{signal:c.signal,cache:'no-store'});if(r.ok){const t=await r.text();if(t.length>80)return t}}catch{}}return null}function strip(h){const d=document.createElement('div');d.innerHTML=h||'';return(d.textContent||'').replace(/\s+/g,' ').trim()}function rel(t,s){let x=(t+' '+s).toLowerCase(),n=0;terms.forEach(k=>{if(x.includes(k))n+=3});assetList.forEach(a=>{let b=a[0].toLowerCase().replace('usd','');if(b&&x.includes(b))n++});return n}function score(s){let b=50;if(Date.now()-s.time<3600000)b+=10;if(s.red)b+=15;b+=Math.min(15,s.relevance||0);return Math.min(100,Math.round(b*.55+(s.sourceScore||50)*.45))}async function feed(f){const txt=await ft(f.rss);if(!txt)return[];const xml=new DOMParser().parseFromString(txt,'application/xml');return[...xml.querySelectorAll('item, entry')].slice(0,12).map(i=>{const title=i.querySelector('title')?.textContent?.trim()||'Untitled';const link=i.querySelector('link')?.textContent?.trim()||i.querySelector('link')?.getAttribute('href')||'#';const pub=i.querySelector('pubDate')?.textContent||i.querySelector('published')?.textContent||i.querySelector('updated')?.textContent||'';const summary=strip(i.querySelector('description')?.textContent||i.querySelector('summary')?.textContent||'');return{sourceName:f.name,sourceScore:f.score,title,link,summary,time:Number.isFinite(Date.parse(pub))?Date.parse(pub):Date.now(),relevance:rel(title,summary),red:/cpi|fomc|nfp|pce|ppi|fed|rates|jobs|inflation/i.test(title+' '+summary)}})}function renderNews(items,mode){const top=items.map(x=>({...x,final:score(x)})).sort((a,b)=>b.final-a.final).slice(0,15);news.innerHTML='<div class="muted">Mode: '+mode+' • Showing '+top.length+' ranked stories</div>'+top.map((s,i)=>'<div class="story"><div class="muted">#'+(i+1)+' • '+esc(s.sourceName)+'</div><a href="'+esc(s.link)+'" target="_blank">'+esc(s.title)+'</a><div class="muted">'+esc((s.summary||'').slice(0,220))+'</div><div class="score">Score: '+s.final+' | Source: '+s.sourceScore+' | Relevance: '+s.relevance+'</div></div>').join('');tone.textContent=/gold|oil|panic|selloff|inflation|rates|crisis|collapse/i.test(top.map(x=>x.title).join(' '))?'Defensive / Volatile':'Mixed'}async function refreshNews(){health.textContent='Loading';const r=await Promise.allSettled(feeds.map(feed));const live=r.filter(x=>x.status==='fulfilled').flatMap(x=>x.value);renderNews(live.length?live:fallback,live.length?'Live RSS':'Fallback');health.textContent=live.length?live.length+' live articles':'Fallback: '+fallback.length+' ranked';last.textContent=new Date().toLocaleTimeString();renderSources()}function renderSources(){sources.innerHTML='<table><thead><tr><th>Source</th><th>Score</th></tr></thead><tbody>'+feeds.sort((a,b)=>b.score-a.score).map(f=>'<tr><td>'+esc(f.name)+'</td><td>'+f.score+'</td></tr>').join('')+'</tbody></table>'}function chart(sym,label){chartLabel.textContent=label+' • '+sym;tvOpen.href='https://www.tradingview.com/chart/?symbol='+encodeURIComponent(sym);tv.src='https://s.tradingview.com/widgetembed/?frameElementId=tdchart&symbol='+encodeURIComponent(sym)+'&interval=5&hidesidetoolbar=1&symboledit=1&saveimage=0&toolbarbg=0f172a&studies=[]&theme=dark&style=1&timezone=Etc%2FUTC&withdateranges=1&hideideas=1'}function renderSymbols(){symbols.innerHTML=assetList.map((a,i)=>'<button class="sym '+(i===0?'active':'')+'" data-s="'+a[1]+'" data-label="'+a[0]+'">'+a[0]+'</button>').join('');assetRoot.innerHTML=assetList.map(a=>'<div class="card"><b>'+a[0]+'</b><div class="muted">'+a[2]+'</div></div>').join('');document.querySelectorAll('.sym').forEach(b=>b.onclick=()=>{document.querySelectorAll('.sym').forEach(x=>x.classList.remove('active'));b.classList.add('active');chart(b.dataset.s,b.dataset.label)});chart(assetList[0][1],assetList[0][0])}const markets=[['New York','NYSE / Nasdaq','America/New_York'],['Chicago','CME','America/Chicago'],['London','LSE','Europe/London'],['Frankfurt','Xetra','Europe/Berlin'],['Tokyo','TSE','Asia/Tokyo'],['Hong Kong','HKEX','Asia/Hong_Kong']];function zoneParts(tz){const p=new Intl.DateTimeFormat('en-US',{timeZone:tz,weekday:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date());let o={};p.forEach(x=>{if(x.type!=='literal')o[x.type]=x.value});return o}function renderClocks(){const el=$('clockGrid');if(!el)return;el.innerHTML=markets.map(m=>{const p=zoneParts(m[2]);return '<div class="card"><b>'+m[0]+'</b><div class="muted">'+m[1]+'</div><div class="big">'+p.hour+':'+p.minute+':'+p.second+'</div><span class="status closed">CLOSED</span> <span class="muted">'+p.weekday+'</span></div>'}).join('');session.textContent='Weekend / Markets Closed'}function setSpan(el,span){span=Math.max(3,Math.min(12,span));el.dataset.span=span;el.classList.remove('s3','s4','s6','s8','s9','s12');el.classList.add('s'+span)}function saveLayout(){localStorage.setItem('td_v4_layout',JSON.stringify([...document.querySelectorAll('.movable')].map(el=>({id:el.dataset.id,span:+el.dataset.span}))))}function loadLayout(){try{const state=JSON.parse(localStorage.getItem('td_v4_layout')||'[]');state.forEach(x=>{const el=document.querySelector('[data-id="'+x.id+'"]');if(el){setSpan(el,x.span);grid.appendChild(el)}})}catch{}}function movePanel(el,dir){if(dir==='up'&&el.previousElementSibling)el.parentElement.insertBefore(el,el.previousElementSibling);if(dir==='down'&&el.nextElementSibling)el.parentElement.insertBefore(el.nextElementSibling,el);if(dir==='left')setSpan(el,(+el.dataset.span||6)-1);if(dir==='right')setSpan(el,(+el.dataset.span||6)+1);saveLayout()}function wireMove(){document.querySelectorAll('.moveBtn').forEach(btn=>btn.onclick=()=>{const p=btn.closest('.movable');btn.classList.toggle('on');p.classList.toggle('selected');p.querySelector('.arrows').classList.toggle('on')});document.querySelectorAll('.arrowBtn').forEach(btn=>btn.onclick=()=>movePanel(btn.closest('.movable'),btn.dataset.move))}function boot(){build();loadLayout();wireMove();renderSymbols();renderSources();refreshNews();renderClocks();refreshBtn.onclick=refreshNews;notes.value=localStorage.getItem('td_notes')||'';notes.oninput=()=>localStorage.setItem('td_notes',notes.value);setInterval(renderClocks,1000);setInterval(refreshNews,300000)}boot();</script></body></html>
