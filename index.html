<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trader Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="p-4 space-y-4">

  <!-- TOP BAR -->
  <div class="bg-zinc-900 p-4 rounded-xl flex justify-between text-sm">
    <div>London: coming soon</div>
    <div>NY: coming soon</div>
    <div class="text-red-400">⚠️ Red Folder: CPI</div>
  </div>

  <!-- BIAS -->
  <div class="bg-zinc-900 p-4 rounded-xl">
    <h2 class="text-yellow-400 mb-2">USDJPY</h2>
    <p>Bias: <span class="text-red-400">Bearish</span></p>
    <p>State: Wait</p>
    <p>PDH: 159.49</p>
    <p>PDL: 158.85</p>
  </div>

  <!-- CHART -->
  <div class="bg-zinc-900 p-2 rounded-xl">
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=OANDA%3AUSDJPY&interval=15&theme=dark"
      style="width:100%; height:400px; border:none;">
    </iframe>
  </div>

  <!-- RED FOLDER -->
  <div class="bg-zinc-900 p-4 rounded-xl">
    <h2 class="text-red-400 mb-2">Red Folder</h2>
    <p>USD CPI</p>
    <p>08:30 ET</p>
    <p class="text-sm mt-2">No trades before release</p>
  </div>

  <ul id="news"></ul>

<script>
async function loadNews() {
  const feeds = [
    "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/zerohedge/feed",
    "https://api.rss2json.com/v1/api.json?rss_url=https://coinbureau.com/feed/"
  ];

  const newsContainer = document.getElementById("news");

  for (let feed of feeds) {
    const res = await fetch(feed);
    const data = await res.json();

    data.items.slice(0, 3).forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a>`;
      newsContainer.appendChild(li);
    });
  }
}

loadNews();
</script>
</div>

</body>
</html>
