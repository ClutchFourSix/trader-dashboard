<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Desk</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
  --panel-opacity:0.70;
}

body{
  margin:0;
  color:#e6f7ff;
  font-family:Inter, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.60), rgba(0,0,0,0.70)),
    url("./world-map.jpg") center/cover no-repeat fixed;
}

/* cleaner title */
.hero h1{
  text-transform:uppercase;
  letter-spacing:.08em;
}

/* prevent wrap ugliness */
#watchlistState{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* panels */
.panel{
  background:rgba(10,18,30,var(--panel-opacity));
  border:1px solid rgba(103,232,249,0.25);
  border-radius:20px;
}

/* flip clock style */
.clock-time{
  font-family:monospace;
  background:#000;
  padding:4px 8px;
  border-radius:6px;
  letter-spacing:2px;
}
</style>
</head>

<body>

<div class="shell">

<!-- HEADER -->
<section class="panel p-4 flex justify-between items-center">
  <h1>Trader Desk</h1>
  <div>
    <button id="refreshBtn">Refresh</button>
    <button id="openSettingsBtn">Settings</button>
  </div>
</section>

<!-- STATUS -->
<section class="panel p-4">
  <div id="currentSession">Loading...</div>
  <div id="redFolderBadge">Loading...</div>
  <div id="watchlistState">Loading...</div>
</section>

<!-- NEWS -->
<section class="panel p-4">
  <div id="news">Loading...</div>
</section>

<!-- ASSETS -->
<section class="panel p-4">
  <div id="assetGrid"></div>
</section>

</div>

<script>

/* SAFE FETCH */
async function safeFetch(url){
  try{
    const controller = new AbortController();
    setTimeout(()=>controller.abort(),5000);

    const res = await fetch(url,{signal:controller.signal});
    return await res.json();
  }catch{
    return null;
  }
}

/* SAFE YAHOO */
async function getPD(symbol){
  const data = await safeFetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=2d&interval=1d`);

  try{
    const q = data.chart.result[0].indicators.quote[0];
    return {
      high:q.high[0]||0,
      low:q.low[0]||0
    };
  }catch{
    return {high:0,low:0};
  }
}

/* ADD ASSET FIX */
async function addAsset(symbol){
  const pd = await getPD(symbol);

  assets.push({
    symbol,
    pdh:pd.high,
    pdl:pd.low,
    price:0
  });

  render();
}

/* NEWS FIX */
async function loadNews(){

  const sources = [
    {
      name:"ZeroHedge",
      url:"https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/zerohedge/feed"
    },
    {
      name:"FXStreet",
      url:"https://api.rss2json.com/v1/api.json?rss_url=https://www.fxstreet.com/rss/news"
    }
  ];

  const container = document.getElementById("news");
  container.innerHTML="";

  for(const s of sources){
    const data = await safeFetch(s.url);

    if(data && data.items && data.items.length){
      const item = data.items[0];
      const div=document.createElement("div");
      div.innerHTML=`<a href="${item.link}" target="_blank">${s.name}: ${item.title}</a>`;
      container.appendChild(div);
    }
  }
}

/* RENDER */
function render(){
  document.getElementById("watchlistState").innerText="Trade: 0 | Wait: 1 | No Trade: 1";
}

/* INIT */
loadNews();
render();

</script>

</body>
</html>
