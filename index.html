<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Desk</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url("./world-map.jpg") center center / cover no-repeat fixed;
  color: white;
}

.tile {
  background: rgba(24,24,27,0.9);
  backdrop-filter: blur(4px);
}
</style>
</head>

<body class="p-3">

<!-- HEADER -->
<div class="text-center mb-3">
  <h1 class="text-xl font-bold">TRADER DESK</h1>
  <div id="session" class="text-sm text-green-400"></div>
</div>

<!-- RED FOLDER -->
<div class="tile p-3 rounded-xl mb-3 border border-red-500">
  <div class="font-bold text-red-400 mb-1">⚠ RED FOLDER (24H)</div>
  <div id="redFolder"></div>
</div>

<!-- WEEK EVENTS -->
<div class="tile p-3 rounded-xl mb-3">
  <div class="font-bold mb-1">📅 This Week</div>
  <div id="weekEvents"></div>
</div>

<!-- NEWS -->
<div class="tile p-3 rounded-xl mb-3">
  <div class="font-bold mb-1">📰 High Impact News</div>
  <div id="news"></div>
</div>

<!-- SUMMARY -->
<div class="tile p-3 rounded-xl mb-3">
  <div id="summary"></div>
</div>

<!-- ASSETS -->
<div id="assets" class="space-y-2"></div>

<!-- ADD ASSET (MOVED BELOW) -->
<div class="tile p-3 rounded-xl mt-3">
  <div class="font-bold mb-2">➕ Add Asset</div>
  <input id="symbolInput" class="w-full p-2 text-black rounded mb-2" placeholder="e.g. BTCUSD, USDJPY, GC">
  <button onclick="addAsset()" class="bg-green-600 px-3 py-2 rounded w-full">Add</button>
</div>

<script>
let assets = JSON.parse(localStorage.getItem("assets") || "[]");

function genID(){
  return Date.now()+Math.random();
}

/* ===== FUTURES PROXY ===== */
function mapSymbol(sym){
  const map = {
    "GC":"XAUUSD",
    "MGC":"XAUUSD",
    "CL":"USOIL",
    "MCL":"USOIL",
    "SI":"XAGUSD",
    "ES":"SPX",
    "NQ":"NASDAQ",
    "YM":"DOW",
    "6E":"EURUSD",
    "6J":"USDJPY",
    "6B":"GBPUSD"
  };
  return map[sym] || sym;
}

/* ===== ADD ===== */
function addAsset(){
  let s = document.getElementById("symbolInput").value.toUpperCase();
  if(!s) return;

  assets.push({
    id: genID(),
    symbol: s,
    proxy: mapSymbol(s),
    price: "",
    prev: "",
    high: "",
    low: "",
    open: true
  });

  save();
  render();
}

/* ===== SAVE ===== */
function save(){
  localStorage.setItem("assets", JSON.stringify(assets));
}

/* ===== SESSION ===== */
function updateSession(){
  let now = new Date();
  let h = now.getUTCHours();

  let session = "ASIA";

  if(h>=7 && h<12) session = "LONDON";
  if(h>=12 && h<21) session = "NEW YORK";

  document.getElementById("session").innerText = session;
}

/* ===== RED FOLDER ===== */
const events = [
  {name:"CPI", date:new Date("2026-03-18T12:30:00Z")},
];

function updateEvents(){
  let now = new Date();

  let rf = events.filter(e=>{
    let diff = (e.date-now)/1000/60/60;
    return diff < 24 && diff > -2;
  });

  document.getElementById("redFolder").innerHTML =
    rf.map(e=>`${e.name} (${e.date.toUTCString()})`).join("<br>") || "None";

  document.getElementById("weekEvents").innerHTML =
    events.map(e=>`${e.name} (${e.date.toDateString()})`).join("<br>");
}

/* ===== NEWS ===== */
async function loadNews(){
  let sources = [
    "https://api.allorigins.win/raw?url=https://coinbureau.com/feed/",
    "https://api.allorigins.win/raw?url=https://www.zerohedge.com/fullrss2.xml"
  ];

  let used = {};
  let items = [];

  for(let url of sources){
    try{
      let res = await fetch(url);
      let txt = await res.text();
      let parser = new DOMParser();
      let xml = parser.parseFromString(txt,"text/xml");

      let entries = xml.querySelectorAll("item");

      for(let e of entries){
        let title = e.querySelector("title").textContent;

        if(!used[url]){
          items.push(title);
          used[url] = true;
        }
      }
    }catch{}
  }

  document.getElementById("news").innerHTML =
    items.slice(0,5).join("<br>");
}

/* ===== COINGECKO ===== */
async function fetchCrypto(sym){
  try{
    let id = sym.replace("USD","").toLowerCase();
    let res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
    let data = await res.json();
    return data[id].usd;
  }catch{return null;}
}

/* ===== STRATEGY ===== */
function evaluate(a){
  let p = parseFloat(a.price);
  let h = parseFloat(a.high);
  let l = parseFloat(a.low);

  if(!p || !h || !l) return "WAIT";

  if(p > h) return "EXPANSION ↑";
  if(p < l) return "EXPANSION ↓";

  if(p < h && p > l){
    return "FAILURE ZONE";
  }

  return "WAIT";
}

/* ===== RENDER ===== */
async function render(){

  updateSession();
  updateEvents();

  let el = document.getElementById("assets");
  el.innerHTML = "";

  let trade=0, wait=0;

  for(let a of assets){

    if(a.symbol.includes("BTC") || a.symbol.includes("ETH")){
      let price = await fetchCrypto(a.symbol);
      if(price) a.price = price;
    }

    let verdict = evaluate(a);

    if(verdict.includes("EXPANSION")) trade++;
    else wait++;

    let div = document.createElement("div");
    div.className = "tile p-3 rounded-xl";

    div.innerHTML = `
    <div onclick="toggle(${a.id})" class="font-bold">${a.symbol} (${a.proxy})</div>

    ${a.open ? `
    <input placeholder="Price" value="${a.price}" onchange="update(${a.id},'price',this.value)" class="w-full text-black p-1 mt-1 rounded">
    <input placeholder="Prev" value="${a.prev}" onchange="update(${a.id},'prev',this.value)" class="w-full text-black p-1 mt-1 rounded">
    <input placeholder="High" value="${a.high}" onchange="update(${a.id},'high',this.value)" class="w-full text-black p-1 mt-1 rounded">
    <input placeholder="Low" value="${a.low}" onchange="update(${a.id},'low',this.value)" class="w-full text-black p-1 mt-1 rounded">

    <div class="mt-2 text-green-400">${verdict}</div>

    <iframe src="https://s.tradingview.com/widgetembed/?symbol=${a.proxy}&interval=5&theme=dark" class="w-full h-48 mt-2"></iframe>
    `:""}
    `;

    el.appendChild(div);
  }

  document.getElementById("summary").innerText =
    `TRADE: ${trade} | WAIT: ${wait}`;

  save();
}

/* ===== UPDATE ===== */
function update(id,key,val){
  let a = assets.find(x=>x.id===id);
  a[key]=val;
  save();
}

/* ===== TOGGLE ===== */
function toggle(id){
  let a = assets.find(x=>x.id===id);
  a.open = !a.open;
  render();
}

/* ===== AUTO REFRESH ===== */
setInterval(render,60000);
setInterval(loadNews,300000);

/* INIT */
render();
loadNews();
</script>

</body>
</html>
