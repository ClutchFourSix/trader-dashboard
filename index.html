<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trader Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
  <div class="p-4 space-y-4 max-w-3xl mx-auto">

    <!-- TOP BAR -->
    <div class="bg-zinc-900 p-4 rounded-xl">
      <div class="grid grid-cols-1 sm:grid-cols-4 gap-3 text-sm">
        <div>
          <div class="text-zinc-400">Current Session</div>
          <div id="currentSession" class="text-yellow-400 font-semibold mt-1">Loading...</div>
        </div>
        <div>
          <div class="text-zinc-400">London Opens In</div>
          <div id="londonCountdown" class="font-semibold mt-1">Loading...</div>
        </div>
        <div>
          <div class="text-zinc-400">NY Opens In</div>
          <div id="nyCountdown" class="font-semibold mt-1">Loading...</div>
        </div>
        <div>
          <div class="text-zinc-400">Red Folder</div>
          <div class="text-red-400 font-semibold mt-1">⚠️ CPI</div>
        </div>
      </div>
      <div class="text-xs text-zinc-500 mt-3">
        Session clock uses America/New_York time.
      </div>
    </div>

    <!-- BIAS -->
    <div class="bg-zinc-900 p-4 rounded-xl">
      <h2 class="text-yellow-400 mb-2 text-2xl font-semibold">USDJPY</h2>
      <p>Bias: <span class="text-red-400">Bearish</span></p>
      <p>State: Wait</p>
      <p>PDH: 159.49</p>
      <p>PDL: 158.85</p>
    </div>

    <!-- CHART -->
    <div class="bg-zinc-900 p-2 rounded-xl">
      <iframe
        src="https://s.tradingview.com/widgetembed/?symbol=OANDA%3AUSDJPY&interval=15&theme=dark"
        style="width:100%; height:400px; border:none;"
      ></iframe>
    </div>

    <!-- RED FOLDER -->
    <div class="bg-zinc-900 p-4 rounded-xl">
      <h2 class="text-red-400 mb-2 text-xl font-semibold">Red Folder</h2>
      <p>USD CPI</p>
      <p>08:30 ET</p>
      <p class="text-sm mt-2">No trades before release</p>
    </div>

    <!-- NEWS -->
    <div class="bg-zinc-900 p-4 rounded-xl">
      <h2 class="text-green-400 mb-3 text-xl font-semibold">News</h2>
      <ul id="news" class="space-y-3 text-sm text-zinc-300">
        <li>Loading news...</li>
      </ul>
    </div>

  </div>

  <script>
    function getNYParts() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "numeric",
        day: "numeric",
        hour: "numeric",
        minute: "numeric",
        second: "numeric",
        hour12: false
      });

      const parts = formatter.formatToParts(now);
      const map = {};
      for (const part of parts) {
        if (part.type !== "literal") map[part.type] = parseInt(part.value, 10);
      }
      return map;
    }

    function secondsUntil(targetHour, targetMinute, nowParts) {
      const nowSec = nowParts.hour * 3600 + nowParts.minute * 60 + nowParts.second;
      const targetSec = targetHour * 3600 + targetMinute * 60;
      let diff = targetSec - nowSec;
      if (diff < 0) diff += 24 * 3600;
      return diff;
    }

    function formatDuration(totalSeconds) {
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return `${String(h).padStart(2, "0")}h ${String(m).padStart(2, "0")}m ${String(s).padStart(2, "0")}s`;
    }

    function getCurrentSessionLabel(nowParts) {
      const totalMinutes = nowParts.hour * 60 + nowParts.minute;

      // ET session windows
      // Asia:    19:00 - 02:59
      // London:  03:00 - 07:59
      // New York:08:00 - 16:59
      // Reset:   17:00 - 18:59

      if (totalMinutes >= 180 && totalMinutes < 480) return "London Session";
      if (totalMinutes >= 480 && totalMinutes < 1020) return "New York Session";
      if (totalMinutes >= 1140 || totalMinutes < 180) return "Asia Session";
      return "Reset / Between Sessions";
    }

    function updateSessionBar() {
      const nowParts = getNYParts();

      const londonCountdown = document.getElementById("londonCountdown");
      const nyCountdown = document.getElementById("nyCountdown");
      const currentSession = document.getElementById("currentSession");

      currentSession.textContent = getCurrentSessionLabel(nowParts);
      londonCountdown.textContent = formatDuration(secondsUntil(3, 0, nowParts));
      nyCountdown.textContent = formatDuration(secondsUntil(8, 0, nowParts));
    }

    async function loadNews() {
      const feeds = [
        {
          name: "ZeroHedge",
          url: "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/zerohedge/feed"
        },
        {
          name: "Coin Bureau",
          url: "https://api.rss2json.com/v1/api.json?rss_url=https://www.coinbureau.com/feed/"
        }
      ];

      const newsContainer = document.getElementById("news");
      newsContainer.innerHTML = "";

      for (const feed of feeds) {
        try {
          const res = await fetch(feed.url);
          const data = await res.json();

          if (!data.items || !data.items.length) {
            const li = document.createElement("li");
            li.textContent = `${feed.name}: no items returned`;
            newsContainer.appendChild(li);
            continue;
          }

          data.items.slice(0, 3).forEach(item => {
            const li = document.createElement("li");
            li.innerHTML = `
              <a href="${item.link}" target="_blank" class="text-blue-400 underline">
                ${feed.name}: ${item.title}
              </a>
            `;
            newsContainer.appendChild(li);
          });
        } catch (err) {
          const li = document.createElement("li");
          li.textContent = `${feed.name}: failed to load`;
          newsContainer.appendChild(li);
        }
      }
    }

    updateSessionBar();
    setInterval(updateSessionBar, 1000);
    loadNews();
  </script>
</body>
</html>
