name: Evaluate Source Scores

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

jobs:
  evaluate-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Evaluate source scores
        run: python tools/evaluate_source_scores.py

      - name: Commit updated scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-scores.json data/source-score-history.json
          git diff --cached --quiet || git commit -m "Update source scores"
          git push
