name: Discover Sources

on:
  workflow_dispatch:
  schedule:
    - cron: '7,37 * * * *'

permissions:
  contents: write

jobs:
  discover-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Discover and score source candidates
        run: python tools/discover_sources.py

      - name: Commit discovery outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-candidates.json data/discovery-history.json
          git diff --cached --quiet || git commit -m "Update source discovery candidates"
          git push
